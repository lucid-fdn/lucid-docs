name: Sync SDK Docs from Speakeasy

on:
  # Manual trigger
  workflow_dispatch:
  
  # Auto-sync every 6 hours (no PAT needed)
  schedule:
    - cron: '0 */6 * * *'
  
  # Also triggered by repository_dispatch if PAT is configured
  repository_dispatch:
    types: [sdk-updated]

jobs:
  sync-sdk-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run SDK docs rebuild
        run: python scripts/rebuild-sdk-docs.py

      - name: Validate docs
        run: python scripts/validate-docs.py
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdks/
          git add docs.json scripts/rebuild-sdk-docs.py scripts/validate-docs.py .github/workflows/sync-sdk-docs.yml
          git commit -m 'docs: auto-sync SDK docs from Speakeasy [skip ci]'
          git push
