name: Sync Generated Public Docs

on:
  # Manual trigger
  workflow_dispatch:
  
  # Auto-sync every 6 hours (no PAT needed)
  schedule:
    - cron: '0 */6 * * *'
  
  # Also triggered by repository_dispatch if PAT is configured
  repository_dispatch:
    types: [sdk-updated]

jobs:
  sync-generated-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LUCID_L2_ROOT: ${{ github.workspace }}/.sources/Lucid-L2
      LUCID_WIKI_ROOT: ${{ github.workspace }}/.sources/lucid-wiki
      LUCID_CLOUD_ROOT: ${{ github.workspace }}/.sources/lucid-cloud
      DOCS_SOURCE_TOKEN: ${{ secrets.DOCS_SOURCE_TOKEN }}
    
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Checkout Lucid-L2 source
        uses: actions/checkout@v4
        with:
          repository: lucid-fdn/Lucid-L2
          path: .sources/Lucid-L2

      - name: Checkout private source docs
        if: env.DOCS_SOURCE_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: lucid-fdn/lucid-wiki
          path: .sources/lucid-wiki
          token: ${{ env.DOCS_SOURCE_TOKEN }}

      - name: Checkout private gateway source
        if: env.DOCS_SOURCE_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: lucid-fdn/lucid-cloud
          path: .sources/lucid-cloud
          token: ${{ env.DOCS_SOURCE_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild public source docs
        run: python scripts/rebuild-public-sources.py
      
      - name: Run SDK docs rebuild
        run: python scripts/rebuild-sdk-docs.py

      - name: Validate docs
        run: python scripts/validate-docs.py
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m 'docs: auto-sync generated public docs [skip ci]'
          git push
