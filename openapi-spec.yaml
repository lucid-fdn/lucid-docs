openapi: 3.0.3
info:
  title: LucidLayer API
  version: 1.0.0
  description: |
    LucidLayer API — the verifiable AI execution layer.

    Blockchain-anchored infrastructure giving AI assets (models, agents, tools, compute, datasets)
    provable identity, cryptographic receipts, and reputation backed by real traffic data.

    **Open-source and self-hostable.** Run your own instance with `docker compose up`
    or `npm start` (port 3001). The SDK defaults to `http://localhost:3001` — no cloud
    account required.

    This OpenAPI spec is the source of truth for all backend routes and is used to
    generate SDK clients via [Speakeasy](https://speakeasy.com).

    ## Version Strategy

    | Prefix | Status | Description |
    |--------|--------|-------------|
    | `/v1/*` | **Stable** | Core API — passports, receipts, epochs, payouts, inference, agent deployment. Production-ready and covered by semver guarantees. |
    | `/v2/*` | **Stable** | Cross-chain and reputation APIs — EVM multi-chain, ERC-8004, pluggable reputation. Production-ready. |
    | `/api/agents/*` | **Deprecated** | Legacy agent MMR orchestration. Retained for SDK backward compatibility only. Migrate to `/v1/agents/*` (AgentDeploy, AgentMirror). Will be removed in a future major version. |
    | `/health/*` | **Stable** | System health probes — not versioned (infrastructure endpoints). |

    ### Migration Path (legacy `/api/agents/*` to `/v1/agents/*`)

    1. Replace `init_agent` + `process_agent_epoch` with `lucid_deploy_agent` (one-click deployment).
    2. Replace `generate_agent_proof` with `lucid_get_agent_proof` / `lucid_get_agent_run_proof` (AgentMirror).
    3. Replace `get_agent_stats` / `get_agent_history` with `lucid_get_agent_receipts` + `lucid_get_agent_epoch`.
    4. All legacy operationIds will be removed when the next major version ships.

    ## Route Groups

    - `/v1/*` — Passports, Match, Run, Receipts, Epochs, Payouts, Compute
    - `/v1/agents/*` — Agent Deployment, Wallet, Revenue, Mirror (receipts/proofs)
    - `/v1/a2a/*` — A2A Protocol (Agent-to-Agent)
    - `/v1/config/*` — Payment configuration and grants
    - `/v2/chains/*` — Cross-chain status and routing
    - `/v2/agents/*` — ERC-8004 agent registration and reputation
    - `/v2/reputation/*` — Pluggable reputation scoring, cross-chain aggregation
    - `/v2/payouts/*` — On-chain payout execution
    - `/health/*` — System health and dependency checks
    - `/api/agents/*` — Legacy agent MMR orchestration (deprecated)
servers:
  - url: http://localhost:3001
    description: Local / self-hosted (default for open-source users)
    x-speakeasy-server-id: local
  - url: https://{host}:{port}
    description: Self-hosted instance (custom host and port)
    x-speakeasy-server-id: self-hosted
    variables:
      host:
        default: localhost
        description: Hostname or IP of your Lucid instance
      port:
        default: "3001"
        description: Port your Lucid instance listens on
  - url: https://api.lucid.foundation
    description: Managed cloud (Raijin Labs hosted)
    x-speakeasy-server-id: cloud
security:
  - BearerAuth: []
  - {}
# Speakeasy MCP tool generation configuration
x-speakeasy-mcp:
  scope-mapping:
    - pattern: "^(get|list|search)"
      scopes: [read]
    - pattern: "^(verify|check)"
      scopes: [read]
    - pattern: "^(create|update|trigger|submit|commit|retry|run|calculate|init|process|plan|accomplish|execute|validate|release|dispute|open|resolve|appeal|sponsor|estimate|link|unlink|install|uninstall|configure|prove|register|generate)"
      scopes: [write]
    - pattern: "^(delete)"
      scopes: [write, destructive]
x-speakeasy-retries:
  strategy: backoff
  backoff:
    initialInterval: 500
    maxInterval: 60000
    maxElapsedTime: 300000
    exponent: 1.5
  statusCodes:
    - "408"
    - "429"
    - "5XX"
  retryConnectionErrors: true
x-speakeasy-errors:
  statusCodes:
    - "4XX"
    - "5XX"
tags:
  - name: Passports
    description: AI asset identity — create, list, update, delete model/compute/tool/dataset/agent passports
  - name: Match
    description: Policy-based compute matching and route planning
  - name: Run
    description: OpenAI-compatible inference (chat completions) and model listing
  - name: Receipts
    description: Cryptographic receipts — create, verify, and generate MMR inclusion proofs
  - name: Epochs
    description: Epoch lifecycle — creation, finalization, on-chain anchoring, and retry
  - name: Payouts
    description: Revenue split calculation and payout execution (basis-point math)
  - name: Compute
    description: Compute node heartbeat registration and health monitoring
  - name: Health
    description: System health — liveness, readiness, and per-dependency status checks
  - name: Agents
    description: "DEPRECATED: Legacy agent MMR orchestration (use AgentDeploy, AgentMirror instead)"
  - name: Shares
    description: Share token launch and revenue airdrop for fractional AI asset ownership
  - name: Escrow
    description: Cross-chain escrow lifecycle — create, release, dispute, and query
  - name: Disputes
    description: Escrow dispute resolution — open, submit evidence, resolve, appeal
  - name: Paymaster
    description: ERC-4337 gas sponsorship — sponsor transactions, estimate fees, check rates
  - name: Identity
    description: Cross-chain identity bridging — CAIP-10 linking, resolution, and chain discovery
  - name: TBA
    description: ERC-6551 Token Bound Accounts — create and query agent wallets
  - name: Modules
    description: ERC-7579 module management — install, uninstall, and configure policy/payout modules
  - name: zkML
    description: Zero-knowledge ML — prove inference, verify proofs, register models on-chain
  - name: Payments
    description: x402 payment configuration — pricing, facilitators, grants, and subscription
  - name: AgentDeploy
    description: Agent deployment lifecycle — deploy, status, logs, scale, terminate across 6 targets
  - name: AgentWallet
    description: Agent PDA wallet — balance, send, policy limits, and transaction history
  - name: AgentRevenue
    description: Agent revenue pools — earnings tracking, airdrop triggers, and pool queries
  - name: A2A
    description: Google A2A protocol — agent cards, task submission, and task lifecycle
  - name: Reputation
    description: Pluggable reputation scoring — algorithms, compute scores, and composite aggregation
  - name: CrossChain
    description: EVM multi-chain operations — chain status, ERC-8004 registration, cross-chain reputation and payouts
  - name: AgentMirror
    description: Read-only agent proof endpoints — receipts, epochs, and MMR proofs (admin auth required)
  - name: Memory
    description: Agent memory — episodic, semantic, procedural, entity, trust-weighted, temporal types with hash-chain provenance
  - name: Anchoring
    description: DePIN anchoring control plane — query, verify, and trace artifact anchor records
  - name: AgentLaunch
    description: Agent activation — launch via image or base runtime, blue-green rollout, promotion, and rollback
  - name: Webhooks
    description: Deployment webhook receivers — normalizes provider-specific callbacks into deployment events
paths:
  # ===========================================================================
  # Passports
  # ===========================================================================
  /v1/passports:
    post:
      tags: [Passports]
      operationId: lucid_create_passport
      summary: Create a passport
      description: |
        Register a new AI asset passport (model, compute, tool, dataset, or agent) with metadata validated against the appropriate JSON schema. Returns the created passport with its generated passport_id.
      x-speakeasy-mcp:
        name: lucid_create_passport
        description: Create a new passport (model/compute/tool/dataset/agent).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePassportRequest'
            example:
              type: model
              owner: "7xK9mQ2vNbPfYkRd3JhEzV1LnWqA8tUcGp4SyDfH5Bo"
              name: "mistral-7b-instruct"
              description: "Mistral 7B Instruct fine-tuned for chat"
              version: "1.0.0"
              tags: ["llm", "chat", "instruct"]
              metadata:
                schema_version: "1.0"
                model_passport_id: "ppt_model_7xK9mQ2v"
                format: "safetensors"
                runtime_recommended: "vllm"
                context_length: 32768
                hf:
                  repo_id: "mistralai/Mistral-7B-Instruct-v0.3"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePassportResponse'
              example:
                success: true
                passport_id: "ppt_model_7xK9mQ2v"
                passport:
                  passport_id: "ppt_model_7xK9mQ2v"
                  type: "model"
                  owner: "7xK9mQ2vNbPfYkRd3JhEzV1LnWqA8tUcGp4SyDfH5Bo"
                  name: "mistral-7b-instruct"
                  status: "active"
                  created_at: 1710288000
                  updated_at: 1710288000
        '400': {$ref: '#/components/responses/BadRequest'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.create({
                type: "model",
                owner: "7xK9mQ2vNbPfYkRd3JhEzV1LnWqA8tUcGp4SyDfH5Bo",
                metadata: {
                  "schema_version": "1.0",
                  "model_passport_id": "ppt_model_7xK9mQ2v",
                  "format": "safetensors",
                  "runtime_recommended": "vllm",
                  "context_length": 32768,
                  "hf": {
                    "repo_id": "mistralai/Mistral-7B-Instruct-v0.3",
                  },
                },
                name: "mistral-7b-instruct",
                description: "Mistral 7B Instruct fine-tuned for chat",
                version: "1.0.0",
                tags: [
                  "llm",
                  "chat",
                  "instruct",
                ],
              });

              console.log(result);
            }

            run();
    get:
      tags: [Passports]
      operationId: lucid_list_passports
      summary: List passports
      description: |
        Retrieve a paginated list of passports with optional filtering by type, owner, status, and tags. Supports free-text search across name, description, and tags. Defaults to page 1, 20 results per page.
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: per_page
            in: parameters
            type: limit
        outputs:
          results: $.passports
      x-speakeasy-mcp:
        name: lucid_list_passports
        description: List passports with filtering, sorting, and pagination.
      parameters:
        - in: query
          name: type
          description: Filter by passport type (model, compute, tool, dataset, agent)
          schema:
            oneOf:
              - $ref: '#/components/schemas/PassportType'
              - type: array
                items: {$ref: '#/components/schemas/PassportType'}
        - in: query
          name: owner
          description: Filter by owner wallet address (Solana base58 or EVM 0x)
          schema: {type: string}
        - in: query
          name: status
          description: Filter by passport status (active, deprecated, revoked)
          schema:
            oneOf:
              - $ref: '#/components/schemas/PassportStatus'
              - type: array
                items: {$ref: '#/components/schemas/PassportStatus'}
        - in: query
          name: tags
          description: Comma-separated
          schema: {type: string}
        - in: query
          name: tag_match
          description: Tag matching mode - all (every tag must match) or any (at least one)
          schema: {type: string, enum: [all, any]}
        - in: query
          name: search
          description: Free-text search across name, description, and tags
          schema: {type: string}
        - in: query
          name: page
          description: Page number for pagination (starts at 1)
          schema: {type: integer, minimum: 1}
        - in: query
          name: per_page
          description: Number of results per page (1-100)
          schema: {type: integer, minimum: 1, maximum: 100}
        - in: query
          name: sort_by
          description: Sort field (created_at, updated_at, or name)
          schema: {type: string, enum: [created_at, updated_at, name]}
        - in: query
          name: sort_order
          description: Sort direction (asc or desc)
          schema: {type: string, enum: [asc, desc]}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPassportsResponse'
              example:
                success: true
                passports:
                  - passport_id: "ppt_model_7xK9mQ2v"
                    type: "model"
                    owner: "7xK9mQ2vNbPfYkRd3JhEzV1LnWqA8tUcGp4SyDfH5Bo"
                    name: "mistral-7b-instruct"
                    status: "active"
                    created_at: 1710288000
                    updated_at: 1710288000
                  - passport_id: "ppt_agent_Qm3kR8wZ"
                    type: "agent"
                    owner: "3fPnY7vUxKdNqB4JhMzRtD9wLcA2SgE6Hp8XkTuVm5Gj"
                    name: "trading-agent-v2"
                    status: "active"
                    created_at: 1710374400
                    updated_at: 1710374400
                pagination:
                  total: 42
                  page: 1
                  per_page: 20
                  total_pages: 3
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.list();

              for await (const page of result) {
                console.log(page);
              }
            }

            run();
  /v1/passports/{passport_id}:
    get:
      tags: [Passports]
      operationId: lucid_get_passport
      summary: Get a passport
      description: |
        Retrieve a single passport by its passport_id, including all metadata, on-chain sync status, DePIN storage CIDs, and NFT mint addresses.
      x-speakeasy-mcp:
        name: lucid_get_passport
        description: Retrieve a passport by its passport_id.
      parameters:
        - in: path
          name: passport_id
          description: Unique passport identifier (e.g. ppt_model_7xK9mQ2v)
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPassportResponse'
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.get({
                passportId: "<id>",
              });

              console.log(result);
            }

            run();
    patch:
      tags: [Passports]
      operationId: lucid_update_passport
      summary: Update a passport
      description: |
        Update mutable fields on an existing passport (metadata, name, description, version, tags, status). Requires the X-Owner-Address header for ownership verification if configured.
      x-speakeasy-mcp:
        name: lucid_update_passport
        description: Update an existing passport by passport_id.
      parameters:
        - in: path
          name: passport_id
          description: Unique passport identifier to update
          required: true
          schema: {type: string}
        - in: header
          name: X-Owner-Address
          description: Owner wallet address for ownership verification
          required: false
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePassportRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPassportResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.update({
                passportId: "<id>",
                body: {},
              });

              console.log(result);
            }

            run();
    delete:
      tags: [Passports]
      operationId: lucid_delete_passport
      summary: Delete a passport (soft delete)
      description: |
        Soft-delete a passport by setting its status to revoked. The passport record is retained for audit purposes. Requires X-Owner-Address header for ownership verification.
      x-speakeasy-mcp:
        name: lucid_delete_passport
        description: Soft-delete a passport by passport_id.
      parameters:
        - in: path
          name: passport_id
          description: Unique passport identifier to delete (soft delete)
          required: true
          schema: {type: string}
        - in: header
          name: X-Owner-Address
          description: Owner wallet address for ownership verification
          required: false
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, deleted]
                properties:
                  success: {type: boolean}
                  deleted: {type: boolean}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.delete({
                passportId: "<id>",
              });

              console.log(result);
            }

            run();
  /v1/passports/{passport_id}/sync:
    post:
      tags: [Passports]
      operationId: lucid_trigger_passport_sync
      summary: Trigger on-chain sync for a passport
      description: |
        Initiate an on-chain sync for a passport, writing its metadata hash to the Solana lucid_passports program. Returns the PDA address and transaction signature on success.
      x-speakeasy-mcp:
        name: lucid_trigger_passport_sync
        description: Trigger on-chain sync for a passport.
      parameters:
        - in: path
          name: passport_id
          description: Unique passport identifier to sync on-chain
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: {type: boolean}
                  on_chain_pda: {type: string, nullable: true}
                  on_chain_tx: {type: string, nullable: true}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.sync({
                passportId: "<id>",
              });

              console.log(result);
            }

            run();
  /v1/passports/pending-sync:
    get:
      tags: [Passports]
      operationId: lucid_list_passports_pending_sync
      summary: Get passports pending sync
      description: |
        List all passports that have been created or updated off-chain but not yet synced to on-chain state. Useful for monitoring the sync backlog.
      x-speakeasy-mcp:
        name: lucid_list_passports_pending_sync
        description: List passports that are pending on-chain sync.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, count, passports]
                properties:
                  success: {type: boolean}
                  count: {type: integer}
                  passports:
                    type: array
                    items: {$ref: '#/components/schemas/Passport'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.listPendingSync();

              console.log(result);
            }

            run();
  /v1/passports/stats:
    get:
      tags: [Passports]
      operationId: lucid_get_passport_stats
      summary: Passport statistics
      description: |
        Retrieve aggregate statistics about passports including counts by type, status breakdown, and sync status. No authentication required.
      x-speakeasy-mcp:
        name: lucid_get_passport_stats
        description: Get passport statistics.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportStatsResponse'
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.passports.getStats();

              console.log(result);
            }

            run();
  # ===========================================================================
  # Share Tokens
  # ===========================================================================
  /v1/passports/{passport_id}/token/launch:
    post:
      tags: [Shares]
      operationId: lucid_launch_share_token
      summary: Launch a share token for a passport
      description: |
        Create and launch an SPL Token-2022 share token for fractional ownership of an AI asset. Configurable name, symbol, initial supply, and decimals. Requires the passport to exist and not already have a share token.
      x-speakeasy-mcp:
        name: lucid_launch_share_token
        description: Create and launch a share token (SPL) for fractional ownership of a passport.
      parameters:
        - in: path
          name: passport_id
          description: Passport identifier to launch share token for
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenLaunchRequest'
            example:
              name: "Mistral 7B Share"
              symbol: "M7BS"
              initial_supply: 1000000
              decimals: 9
      responses:
        '201':
          description: Token launched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenLaunchResponse'
              example:
                success: true
                mint: "So11111111111111111111111111111111111111112"
                name: "Mistral 7B Share"
                symbol: "M7BS"
                supply: "1000000000000000"
                decimals: 9
                passport_id: "ppt_model_7xK9mQ2v"
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { RaijinLabsLucidAi } from "raijin-labs-lucid-ai";

            const raijinLabsLucidAi = new RaijinLabsLucidAi();

            async function run() {
              const result = await raijinLabsLucidAi.shares.lucidLaunchShareToken({
                passportId: "<id>",
                body: {
                  name: "Mistral 7B Share",
                  symbol: "M7BS",
                  totalSupply: 39757,
                  decimals: 9,
                },
              });

              console.log(result);
            }

            run();
  /v1/passports/{passport_id}/token:
    get:
      tags: [Shares]
      operationId: lucid_get_share_token
      summary: Get share token info for a passport
      description: |
        Retrieve share token information for a passport including the SPL mint address, total supply, decimals, and current holder count. Returns 404 if no share token has been launched.
      x-speakeasy-mcp:
        name: lucid_get_share_token
        description: Get token info (mint, supply, holders) for a passport's share token.
      parameters:
        - in: path
          name: passport_id
          description: Passport identifier to query share token info
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
          content:
