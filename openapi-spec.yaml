        tokenContract: {type: string}
        tokenId: {type: string}
    GetTBAResponse:
      type: object
      required: [success]
      properties:
        success: {type: boolean}
        tba: {$ref: '#/components/schemas/TBAInfo'}
    # =========================================================================
    # v2 ERC-7579 Modules
    # =========================================================================
    InstallModuleRequest:
      type: object
      required: [chainId, account, moduleType, moduleAddress]
      properties:
        chainId: {type: string}
        account: {type: string, description: "Smart account address"}
        moduleType: {type: string, description: "Module type (validator, executor)"}
        moduleAddress: {type: string, description: "Module contract address"}
        initData: {type: string, description: "Optional init calldata (hex)"}
    UninstallModuleRequest:
      type: object
      required: [chainId, account, moduleType, moduleAddress]
      properties:
        chainId: {type: string}
        account: {type: string}
        moduleType: {type: string}
        moduleAddress: {type: string}
    ConfigurePolicyRequest:
      type: object
      required: [chainId, account, policyHashes]
      properties:
        chainId: {type: string}
        account: {type: string}
        policyHashes:
          type: array
          items: {type: string}
    ConfigurePayoutRequest:
      type: object
      required: [chainId, account, recipients, basisPoints]
      properties:
        chainId: {type: string}
        account: {type: string}
        recipients:
          type: array
          items: {type: string}
        basisPoints:
          type: array
          items: {type: integer}
          description: "Must sum to 10000"
    ListModulesResponse:
      type: object
      required: [success]
      properties:
        success: {type: boolean}
        modules: {type: object, description: "Installed modules by type"}
    # =========================================================================
    # v2 zkML
    # =========================================================================
    GenerateZkMLProofRequest:
      type: object
      required: [modelId, inputHash, outputHash, policyHash]
      properties:
        modelId: {type: string}
        inputHash: {type: string}
        outputHash: {type: string}
        policyHash: {type: string}
    VerifyZkMLProofRequest:
      type: object
      required: [chainId, proof, receiptHash]
      properties:
        chainId: {type: string}
        proof: {type: object, description: "Groth16 proof (a, b, c points)"}
        receiptHash: {type: string}
    RegisterZkMLModelRequest:
      type: object
      required: [chainId, modelHash, verifyingKey]
      properties:
        chainId: {type: string}
        modelHash: {type: string}
        verifyingKey: {type: string, description: "Groth16 verifying key (hex)"}
    ZkMLProof:
      type: object
      properties:
        proof: {type: object}
        publicInputs:
          type: array
          items: {type: string}
        modelCircuitHash: {type: string}
        verified: {type: boolean}
    ZkMLVerifyResponse:
      type: object
      required: [success]
      properties:
        success: {type: boolean}
        valid: {type: boolean}
        stage:
          type: string
          enum: [offchain, onchain]
        error: {type: string}
    ListZkMLModelsResponse:
      type: object
      required: [success]
      properties:
        success: {type: boolean}
        models: {type: object}
    # =========================================================================
    # Passport PATCH sub-routes
    # =========================================================================
    UpdatePassportPricingRequest:
      type: object
      properties:
        price_per_request: {type: number}
        billing_model: {type: string}
        revenue_split:
          type: object
          properties:
            compute_bps: {type: integer}
            model_bps: {type: integer}
            protocol_bps: {type: integer}
    UpdatePassportEndpointsRequest:
      type: object
      properties:
        inference_url: {type: string, format: uri}
        health_url: {type: string, format: uri}
        api_base_url: {type: string, format: uri}
    # =========================================================================
    # x402 Payments
    # =========================================================================
    X402PaymentRequired:
      type: object
      required: [error, x402]
      properties:
        error: {type: string, example: Payment Required}
        x402:
          type: object
          required: [version, facilitator, payment, expires]
          properties:
            version: {type: string, example: '2'}
            facilitator: {type: string, example: direct}
            description: {type: string}
            payment:
              type: object
              required: [chain, token, tokenAddress, amount, recipient, facilitator, scheme]
              properties:
                chain: {type: string, example: base-sepolia}
                token: {type: string, example: USDC}
                tokenAddress: {type: string}
                amount: {type: string, description: Amount in micro-units (6 decimals)}
                recipient: {type: string, description: Wallet or splitter contract address}
                facilitator: {type: string}
                scheme: {type: string, enum: [exact]}
            alternatives:
              type: array
              items: {type: object, additionalProperties: true}
            splits:
              type: array
              items: {type: object, additionalProperties: true}
            expires: {type: integer, description: Unix timestamp}
    AssetPricing:
      type: object
      required: [passport_id, payout_address]
      properties:
        passport_id: {type: string}
        price_per_call: {type: string, nullable: true, description: Micro-units (6 decimals)}
        price_per_token: {type: string, nullable: true}
        price_subscription_hour: {type: string, nullable: true}
        accepted_tokens:
          type: array
          items: {type: string}
          default: [USDC]
        accepted_chains:
          type: array
          items: {type: string}
          default: [base]
        payout_address: {type: string}
        custom_split_bps:
          type: object
          nullable: true
          additionalProperties: {type: integer}
        updated_at: {type: string, format: date-time}
    SetAssetPricingRequest:
      type: object
      required: [payout_address]
      properties:
        price_per_call: {type: string, description: Micro-units (e.g. "10000" = $0.01)}
        price_per_token: {type: string}
        price_subscription_hour: {type: string}
        accepted_tokens:
          type: array
          items: {type: string}
        accepted_chains:
          type: array
          items: {type: string}
        payout_address: {type: string}
        custom_split_bps:
          type: object
          additionalProperties: {type: integer}
    RevenueInfo:
      type: object
      required: [total, pending, withdrawn, token]
      properties:
        total: {type: string, description: Total revenue in micro-units}
        pending:
          type: string
          description: Pending revenue that is confirmed but not yet withdrawn
        withdrawn: {type: string, description: Already withdrawn}
        token: {type: string}
    # =========================================================================
    # Payment Grants
    # =========================================================================
    PaymentGrantScope:
      type: object
      required: [models, tools, max_per_call_usd]
      properties:
        models:
          type: array
          items: {type: string}
        tools:
          type: array
          items: {type: string}
        max_per_call_usd: {type: number}
    PaymentGrantLimits:
      type: object
      required: [total_usd, expires_at, max_calls]
      properties:
        total_usd: {type: number}
        expires_at: {type: integer, description: Unix timestamp}
        max_calls: {type: integer}
    PaymentGrantAttestation:
      type: object
      required: [balance_verified_at, balance_source]
      properties:
        balance_verified_at: {type: integer, description: Unix timestamp}
        balance_source:
          type: string
          enum: [escrow, credit, prepaid]
    PaymentGrant:
      type: object
      required: [grant_id, tenant_id, agent_passport_id, run_id, scope, limits, attestation, signature, signer_pubkey]
      properties:
        grant_id: {type: string}
        tenant_id: {type: string}
        agent_passport_id: {type: string}
        run_id: {type: string}
        scope: {$ref: '#/components/schemas/PaymentGrantScope'}
        limits: {$ref: '#/components/schemas/PaymentGrantLimits'}
        attestation: {$ref: '#/components/schemas/PaymentGrantAttestation'}
        signature: {type: string, description: Ed25519 signature (hex)}
        signer_pubkey: {type: string, description: Ed25519 public key (hex)}
    CreatePaymentGrantRequest:
      type: object
      required: [tenant_id, agent_passport_id, run_id, scope, limits]
      properties:
        tenant_id: {type: string}
        agent_passport_id: {type: string}
        run_id: {type: string}
        scope: {$ref: '#/components/schemas/PaymentGrantScope'}
        limits: {$ref: '#/components/schemas/PaymentGrantLimits'}
        attestation:
          $ref: '#/components/schemas/PaymentGrantAttestation'
    # =========================================================================
    # Agent Deployment
    # =========================================================================
    DeployAgentRequest:
      type: object
      required: [name, owner, descriptor]
      properties:
        name: {type: string}
        description: {type: string}
        owner: {type: string}
        descriptor: {type: object, additionalProperties: true, description: Agent runtime descriptor}
        preferred_adapter: {type: string, description: "Runtime adapter (e.g. vercel-ai, openclaw, docker)"}
        tags:
          type: array
          items: {type: string}
        list_on_marketplace: {type: boolean}
    # =========================================================================
    # Agent Launch
    # =========================================================================
    LaunchImageRequest:
      type: object
      required: [mode, image, target, owner, name]
      properties:
        mode:
          type: string
          enum: [image]
          description: Launch mode — bring your own Docker image
        image:
          type: string
          description: Docker image reference (e.g. ghcr.io/myorg/my-agent:latest)
        target:
          type: string
          enum: [docker, railway, akash, phala, ionet, nosana]
          description: Deployment target provider
        owner:
          type: string
          description: Owner wallet address (Solana base58 or EVM 0x)
        name:
          type: string
          description: Human-readable agent name
        port:
          type: integer
          description: Container port to expose (default 8080)
        verification:
          type: string
          enum: [full, minimal]
          default: full
          description: Verification mode (full includes receipts + memory + payment hooks)
        env_vars:
          type: object
          additionalProperties: {type: string}
          description: Additional environment variables injected into the container
        registry_auth:
          type: object
          properties:
            username: {type: string}
            password: {type: string}
          description: Private registry credentials (never stored, used at deploy time only)
    LaunchBaseRuntimeRequest:
      type: object
      required: [mode, model, prompt, target, owner, name]
      properties:
        mode:
          type: string
          enum: [base-runtime]
          description: Launch mode — pre-built base runtime
        model:
          type: string
          description: Model identifier (e.g. gpt-4o, claude-3-opus)
        prompt:
          type: string
          description: System prompt for the agent
        target:
          type: string
          enum: [docker, railway, akash, phala, ionet, nosana]
          description: Deployment target provider
        owner:
          type: string
          description: Owner wallet address (Solana base58 or EVM 0x)
        name:
          type: string
          description: Human-readable agent name
        tools:
          type: array
          items: {type: string}
          description: Optional tool identifiers to enable
    LaunchResponse:
      type: object
      required: [success, reputation_eligible]
      properties:
        success: {type: boolean}
        passport_id:
          type: string
          description: Created passport identifier
        deployment_id:
          type: string
          description: Deployment record identifier
        deployment_url:
          type: string
          description: Public URL of the deployed agent
        verification_mode:
          type: string
          enum: [full, minimal]
          description: Active verification mode
        reputation_eligible:
          type: boolean
          description: Whether the agent is eligible for on-chain reputation scoring
        config_hash:
          type: string
          description: SHA-256 hash of the launch configuration (for audit)
        error:
          type: string
          description: Error message (present only when success is false)
    # =========================================================================
    # Agent Wallet
    # =========================================================================
    AgentWalletSendRequest:
      type: object
      required: [to, amount]
      properties:
        to: {type: string, description: Recipient address}
        amount: {type: string, description: Amount to send}
        token: {type: string, description: "Token mint address (optional, defaults to SOL)"}
    AgentWalletLimitsRequest:
      type: object
      required: [per_tx_usd, daily_usd]
      properties:
        per_tx_usd: {type: number, description: Maximum USD per transaction}
        daily_usd: {type: number, description: Maximum USD per day}
    # =========================================================================
    # Agent Revenue
    # =========================================================================
    AgentRevenuePool:
      type: object
      required: [agent_passport_id, accumulated_lamports, total_distributed_lamports, last_airdrop_at]
      properties:
        agent_passport_id: {type: string}
        accumulated_lamports: {type: string, description: Lamports accumulated in pool}
        total_distributed_lamports: {type: string, description: Total lamports distributed via airdrops}
        last_airdrop_at: {type: integer, description: Unix timestamp of last airdrop (0 if never)}
    AgentPayoutEntry:
      type: object
      required: [run_id, total_amount_lamports, recipients, created_at]
      properties:
        run_id: {type: string}
        total_amount_lamports: {type: string}
        recipients:
          type: array
          items:
            type: object
            properties:
              address: {type: string}
              role: {type: string}
              bps: {type: integer}
              amount_lamports: {type: string}
        created_at: {type: integer}
    # =========================================================================
    # A2A Protocol
    # =========================================================================
    A2AAgentCard:
      type: object
      description: A2A Agent Card for agent discovery (per A2A protocol spec).
      properties:
        name: {type: string}
        description: {type: string}
        url: {type: string}
        provider:
          type: object
          properties:
            organization: {type: string}
            url: {type: string}
        version: {type: string}
        capabilities:
          type: object
          additionalProperties: true
        skills:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              name: {type: string}
              description: {type: string}
    A2ASendTaskRequest:
      type: object
      required: [message]
      properties:
        message:
          type: object
          required: [parts]
          properties:
            role: {type: string}
            parts:
              type: array
              items:
                type: object
                properties:
                  type: {type: string}
                  text: {type: string}
    A2ATask:
      type: object
      properties:
        id: {type: string}
        status:
          type: object
          properties:
            state:
              type: string
              enum: [submitted, working, input-required, completed, failed, canceled]
            timestamp: {type: string, format: date-time}
            message: {type: string}
        artifacts:
          type: array
          items:
            type: object
            properties:
              parts:
                type: array
                items:
                  type: object
                  properties:
                    type: {type: string}
                    text: {type: string}
        history:
          type: array
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    # =========================================================================
    # Reputation Computation
    # =========================================================================
    ReputationAlgorithmInfo:
      type: object
      required: [id, name, version, description]
      properties:
        id: {type: string}
        name: {type: string}
        version: {type: string}
        description: {type: string}
    AlgorithmScore:
      type: object
      required: [overall, components, computedAt]
      properties:
        overall: {type: number, minimum: 0, maximum: 100, description: "Overall score (0-100)"}
        components:
          type: object
          additionalProperties: {type: number}
          description: Component scores (algorithm-specific)
        metadata:
          type: object
          additionalProperties: true
          description: Raw metadata from the computation
        computedAt: {type: integer, description: Unix timestamp}
    CompositeReputationScore:
      type: object
      required: [overall, algorithmScores, computedAt]
      properties:
        overall: {type: number, minimum: 0, maximum: 100}
        algorithmScores:
          type: array
          items:
            type: object
            required: [algorithmId, weight, score]
            properties:
              algorithmId: {type: string}
              weight: {type: number}
              score: {$ref: '#/components/schemas/AlgorithmScore'}
        computedAt: {type: integer, description: Unix timestamp}
    # =========================================================================
    # Cross-Chain
    # =========================================================================
    ChainInfo:
      type: object
      required: [chainId, name, type, connected]
      properties:
        chainId: {type: string}
        name: {type: string}
        type: {type: string, enum: [evm, solana]}
        evmChainId: {type: integer}
        testnet: {type: boolean}
        explorer: {type: string}
        connected: {type: boolean}
        erc8004:
          type: object
          properties:
            identityRegistry: {type: string}
            validationRegistry: {type: string}
            reputationRegistry: {type: string}
    # =========================================================================
    # Agent Mirror
    # =========================================================================
    AgentReceipt:
      type: object
      properties:
        receipt_hash: {type: string}
        run_id: {type: string}
        model_passport_id: {type: string}
        compute_passport_id: {type: string}
        policy_hash: {type: string}
        tokens_in: {type: integer}
        tokens_out: {type: integer}
        model: {type: string}
        status: {type: string}
        created_at: {type: string, format: date-time}
    AgentProof:
      type: object
      required: [passport_id, epoch_id, mmr_root, verified]
      properties:
        passport_id: {type: string}
        epoch_id: {type: string}
        epoch_index: {type: integer}
        mmr_root: {type: string}
        leaf_count: {type: integer}
        chain_tx: {type: string, nullable: true}
        verified: {type: boolean}
        finalized_at: {type: string, format: date-time}
        total_receipts: {type: integer}
    AgentRunProof:
      type: object
      required: [passport_id, run_id, receipt_hash, verified]
      properties:
        passport_id: {type: string}
        run_id: {type: string}
        receipt_hash: {type: string}
        epoch_id: {type: string}
        mmr_root: {type: string}
        chain_tx: {type: string, nullable: true}
        verified: {type: boolean}
        epoch_status: {type: string}
        model_passport_id: {type: string}
        policy_hash: {type: string}
        tokens_in: {type: integer}
        tokens_out: {type: integer}
        status: {type: string}
        created_at: {type: string, format: date-time}
    # =========================================================================
    # Shared
    # =========================================================================
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: {type: boolean}
