        epochs:
          type: array
          items:
            type: object
            required: [agentId, vectors]
            properties:
              agentId: {type: string}
              vectors:
                type: array
                items: {type: string}
                minItems: 1
              epochNumber: {type: integer}
    AgentProofRequest:
      type: object
      required: [agentId, vectorText, epochNumber]
      properties:
        agentId: {type: string}
        vectorText: {type: string}
        epochNumber: {type: integer}
    AgentStats:
      type: object
      properties:
        agentId: {type: string}
        totalEpochs: {type: integer}
        totalVectors: {type: integer}
